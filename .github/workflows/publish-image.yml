name: CD · build & publish frontend image

on:
  push:
    branches: [main]        # 머지되면 이미지 빌드·푸시(publish)
  pull_request:
    branches: [main]        # PR이면 빌드만(푸시 X) — Dockerfile/빌드 깨짐 검증

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # GHCR 푸시 권한

    steps:
      - uses: actions/checkout@v4

      - name: GHCR 로그인
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # PR: push=false 라 빌드만 수행(검증) / main push: 빌드 후 GHCR 푸시
      - name: 이미지 빌드 & (머지 시) Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ghcr.io/teabag-be/asset-box-front:latest
            ghcr.io/teabag-be/asset-box-front:${{ github.sha }}

  # main 푸시 시 EC2(self-hosted runner)에서 프론트 컨테이너만 새 이미지로 교체
  deploy:
    if: github.event_name == 'push'
    runs-on: self-hosted
    needs: image
    steps:
      - name: 레지스트리 로그인
        run: echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: 프론트 컨테이너 배포
        run: |
          cd /home/ubuntu
          sudo docker compose --env-file .env.production pull frontend
          sudo docker compose --env-file .env.production up -d --no-build frontend
          sudo docker image prune -f
