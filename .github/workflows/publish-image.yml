name: CD · build & publish frontend image

on:
  push:
    branches: [main]        # 머지되면 이미지 빌드·푸시(publish)
  pull_request:
    branches: [main]        # PR이면 빌드만(푸시 X) — Dockerfile/빌드 깨짐 검증

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # GHCR 푸시 권한

    steps:
      - uses: actions/checkout@v4

      - name: GHCR 로그인
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # PR: push=false 라 빌드만 수행(검증) / main push: 빌드 후 GHCR 푸시
      - name: 이미지 빌드 & (머지 시) Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ghcr.io/teabag-be/asset-box-front:latest
            ghcr.io/teabag-be/asset-box-front:${{ github.sha }}
