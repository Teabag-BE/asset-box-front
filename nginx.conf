server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;

    # API 프록시 — 브라우저는 같은 출처(/api)로만 호출 → 백엔드(app:8080)로 전달
    # Origin 을 백엔드 CORS 허용값(baseUrl)으로 맞춰 보냄
    location /api/ {
        proxy_pass http://app:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3D 뷰어용 S3 프록시
    # FBXLoader 는 S3 파일을 fetch/XHR 로 읽기 때문에 버킷 CORS가 없으면 막힌다.
    # 브라우저는 같은 출처(/s3-assets)로 요청하고 nginx가 S3 presigned URL을 대신 가져온다.
    location /s3-assets/ {
        proxy_pass https://teabag-assetbox.s3.ap-northeast-2.amazonaws.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host teabag-assetbox.s3.ap-northeast-2.amazonaws.com;
    }

    # /assets is a React route, while /assets/*.js|css are Vite build files.
    # Without exact matches, nginx redirects /assets to the physical asset directory.
    location = /assets {
        try_files /index.html =404;
    }

    location = /assets/ {
        try_files /index.html =404;
    }

    # React Router: 알 수 없는 경로는 index.html 로 폴백 (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 에셋 캐시
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml;
    gzip_min_length 1024;
}
